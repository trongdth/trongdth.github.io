<svg width="680" height="380" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" style="background:#12121a; border-radius:12px;">
  <style>
    text { font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif; }
    .title { font-size: 12px; fill: #8888a0; letter-spacing: 1.5px; text-transform: uppercase; font-family: 'IBM Plex Mono', monospace; }
    .step-text { font-size: 14px; fill: #e2e2ea; font-family: 'IBM Plex Mono', monospace; }
    .connector { stroke: #2a2a3a; stroke-width: 2; }
  </style>

  <text class="title" x="340" y="32" text-anchor="middle">◆ Agent Flow: Jira Project Health Check</text>

  <rect x="24" y="56" width="36" height="36" rx="8" fill="rgba(108,92,231,0.15)"/>
  <text x="42" y="80" text-anchor="middle" font-size="18">⏰</text>
  <text class="step-text" x="74" y="80">9 AM trigger (cron / scheduler)</text>
  <line x1="42" y1="92" x2="42" y2="116" class="connector"/>

  <rect x="24" y="116" width="36" height="36" rx="8" fill="rgba(253,203,110,0.1)"/>
  <text x="42" y="140" text-anchor="middle" font-size="18">📋</text>
  <text class="step-text" x="74" y="140">"Get the active sprint" → Atlassian MCP</text>
  <line x1="42" y1="152" x2="42" y2="176" class="connector"/>

  <rect x="24" y="176" width="36" height="36" rx="8" fill="rgba(0,206,201,0.1)"/>
  <text x="42" y="200" text-anchor="middle" font-size="18">🔍</text>
  <text class="step-text" x="74" y="200">"Find all issues" → group by status</text>
  <line x1="42" y1="212" x2="42" y2="236" class="connector"/>

  <rect x="24" y="236" width="36" height="36" rx="8" fill="rgba(225,112,85,0.1)"/>
  <text x="42" y="260" text-anchor="middle" font-size="18">🚩</text>
  <text class="step-text" x="74" y="256">LLM analyzes: flag stale (3+ days),</text>
  <text class="step-text" x="74" y="274">overloaded assignees (5+ open)</text>
  <line x1="42" y1="278" x2="42" y2="302" class="connector"/>

  <rect x="24" y="302" width="36" height="36" rx="8" fill="rgba(0,184,148,0.1)"/>
  <text x="42" y="326" text-anchor="middle" font-size="18">✅</text>
  <text class="step-text" x="74" y="326">"Post report to group" → Telegram MCP</text>

  <rect x="460" y="100" width="196" height="100" rx="8" fill="rgba(108,92,231,0.06)" stroke="rgba(108,92,231,0.2)" stroke-width="1"/>
  <text x="558" y="122" text-anchor="middle" fill="#8888a0" font-size="11" font-family="'IBM Plex Mono', monospace">MCP connections:</text>
  <text x="476" y="144" fill="#fdcb6e" font-size="11" font-family="'IBM Plex Mono', monospace">Atlassian MCP</text>
  <text x="476" y="160" fill="#8888a0" font-size="10" font-family="'IBM Plex Mono', monospace">→ search, read issues</text>
  <text x="476" y="180" fill="#00cec9" font-size="11" font-family="'IBM Plex Mono', monospace">Telegram MCP</text>
  <text x="476" y="196" fill="#8888a0" font-size="10" font-family="'IBM Plex Mono', monospace">→ send messages</text>

  <rect x="460" y="220" width="196" height="60" rx="8" fill="rgba(225,112,85,0.06)" stroke="rgba(225,112,85,0.2)" stroke-width="1"/>
  <text x="558" y="244" text-anchor="middle" fill="#8888a0" font-size="11" font-family="'IBM Plex Mono', monospace">Guardrails:</text>
  <text x="476" y="266" fill="#fca5a5" font-size="11" font-family="'IBM Plex Mono', monospace">Read-only · 3 retries max</text>

  <line x1="420" y1="160" x2="458" y2="160" stroke="#2a2a3a" stroke-width="1" stroke-dasharray="4 3"/>
</svg>
