<svg width="680" height="400" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" style="background:#12121a; border-radius:12px;">
  <style>
    text { font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif; }
    .title { font-size: 12px; fill: #8888a0; letter-spacing: 1.5px; text-transform: uppercase; font-family: 'IBM Plex Mono', monospace; }
    .label { font-size: 14px; fill: #fff; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
    .desc { font-size: 12px; fill-opacity: 0.7; }
    .loop-text { font-size: 13px; fill: #8888a0; font-family: 'IBM Plex Mono', monospace; }
  </style>

  <!-- Title -->
  <text class="title" x="340" y="32" text-anchor="middle">◆ Anatomy of an AI Agent</text>

  <!-- Brain box (full width) -->
  <rect x="60" y="52" width="560" height="64" rx="10" fill="rgba(108,92,231,0.1)" stroke="rgba(108,92,231,0.4)" stroke-width="1"/>
  <text class="label" x="340" y="78" text-anchor="middle" fill="#6c5ce7">LLM (The Brain)</text>
  <text class="desc" x="340" y="100" text-anchor="middle" fill="#c4b5fd">Reasons, plans, decides the next action. Doesn't do anything itself — only thinks.</text>

  <!-- Tools & Skills box -->
  <rect x="60" y="132" width="178" height="90" rx="10" fill="rgba(253,203,110,0.08)" stroke="rgba(253,203,110,0.3)" stroke-width="1"/>
  <text class="label" x="149" y="162" text-anchor="middle" fill="#fdcb6e">Tools &amp; Skills</text>
  <text class="desc" x="149" y="182" text-anchor="middle" fill="#fde68a">APIs, databases, search,</text>
  <text class="desc" x="149" y="198" text-anchor="middle" fill="#fde68a">code exec — raw or as</text>
  <text class="desc" x="149" y="214" text-anchor="middle" fill="#fde68a">reusable skills</text>

  <!-- Memory box -->
  <rect x="251" y="132" width="178" height="90" rx="10" fill="rgba(0,206,201,0.08)" stroke="rgba(0,206,201,0.3)" stroke-width="1"/>
  <text class="label" x="340" y="162" text-anchor="middle" fill="#00cec9">Memory</text>
  <text class="desc" x="340" y="182" text-anchor="middle" fill="#99f6e4">Short-term context</text>
  <text class="desc" x="340" y="198" text-anchor="middle" fill="#99f6e4">Long-term knowledge</text>

  <!-- Guardrails box -->
  <rect x="442" y="132" width="178" height="90" rx="10" fill="rgba(225,112,85,0.08)" stroke="rgba(225,112,85,0.3)" stroke-width="1"/>
  <text class="label" x="531" y="162" text-anchor="middle" fill="#e17055">Guardrails</text>
  <text class="desc" x="531" y="182" text-anchor="middle" fill="#fca5a5">Safety checks,</text>
  <text class="desc" x="531" y="198" text-anchor="middle" fill="#fca5a5">validation, stop</text>
  <text class="desc" x="531" y="214" text-anchor="middle" fill="#fca5a5">conditions</text>

  <!-- Connector arrow -->
  <text class="loop-text" x="340" y="256" text-anchor="middle">▼ connected by ▼</text>

  <!-- Orchestration Loop box -->
  <rect x="60" y="272" width="560" height="52" rx="10" fill="rgba(255,255,255,0.03)" stroke="#2a2a3a" stroke-width="1" stroke-dasharray="6 4"/>
  <text class="loop-text" x="340" y="304" text-anchor="middle">Orchestration Loop — observe → think → act → evaluate → repeat</text>

  <!-- Tool vs Skill note -->
  <rect x="60" y="340" width="560" height="40" rx="8" fill="rgba(253,203,110,0.06)" stroke="rgba(253,203,110,0.2)" stroke-width="1"/>
  <text x="340" y="360" text-anchor="middle" fill="#fdcb6e" font-size="12" font-family="'IBM Plex Mono', monospace">Tool = raw capability · Skill = tool + instructions + context (same idea, different packaging)</text>
</svg>
